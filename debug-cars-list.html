<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Alle Biler i Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1f2937; margin-bottom: 10px; }
        .subtitle { color: #6b7280; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #f9fafb; padding: 20px; border-radius: 8px; border-left: 4px solid #3b82f6; }
        .stat-label { font-size: 12px; color: #6b7280; text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 32px; color: #1f2937; font-weight: 700; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f3f4f6; padding: 12px; text-align: left; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        tr:hover { background: #f9fafb; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-right: 10px; }
        .btn:hover { background: #2563eb; }
        .btn-secondary { background: #6b7280; }
        .btn-secondary:hover { background: #4b5563; }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .error { background: #fee2e2; color: #991b1b; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .success { background: #d1fae5; color: #065f46; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-available { background: #d1fae5; color: #065f46; }
        .badge-sold { background: #fee2e2; color: #991b1b; }
        .badge-reserved { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug - Alle Biler i Database</h1>
        <p class="subtitle">Se alle biler direkte fra Supabase databasen</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Biler</div>
                <div class="stat-value" id="total-cars">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tilgængelige</div>
                <div class="stat-value" id="available-cars">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Reserveret</div>
                <div class="stat-value" id="reserved-cars">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Solgt</div>
                <div class="stat-value" id="sold-cars">-</div>
            </div>
        </div>
        
        <div style="margin-bottom: 20px;">
            <button class="btn" onclick="loadCars()">🔄 Genindlæs Data</button>
            <button class="btn btn-secondary" onclick="window.location.href='lagerbiler.html'">← Tilbage til Lagerbiler</button>
        </div>
        
        <div id="message"></div>
        <div id="loading" class="loading">Indlæser biler fra database...</div>
        <div id="cars-table"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gfbsuydsquixhrrarjab.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYnN1eWRzcXVpeGhycmFyamFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMjE5NDcsImV4cCI6MjA4NTU5Nzk0N30.M4nA8itsVSpcZb4l1w3cHtl_86KV89BHyt7xNE0hdSY';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function loadCars() {
            const loading = document.getElementById('loading');
            const carsTable = document.getElementById('cars-table');
            const message = document.getElementById('message');
            
            loading.style.display = 'block';
            carsTable.innerHTML = '';
            message.innerHTML = '';
            
            try {
                console.log('🔄 Fetching all cars from Supabase...');
                const { data: cars, error } = await supabaseClient
                    .from('cars')
                    .select('*')
                    .order('id', { ascending: true });
                
                if (error) throw error;
                
                console.log('✅ Loaded cars:', cars);
                
                // Update stats
                document.getElementById('total-cars').textContent = cars.length;
                document.getElementById('available-cars').textContent = cars.filter(c => !c.status || c.status === 'available').length;
                document.getElementById('reserved-cars').textContent = cars.filter(c => c.status === 'reserved').length;
                document.getElementById('sold-cars').textContent = cars.filter(c => c.status === 'sold').length;
                
                // Create table
                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Mærke</th>
                                <th>Model</th>
                                <th>Årgang</th>
                                <th>Pris</th>
                                <th>Status</th>
                                <th>Billeder</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                cars.forEach(car => {
                    const status = car.status || 'available';
                    const statusClass = status === 'available' ? 'badge-available' : 
                                       status === 'reserved' ? 'badge-reserved' : 'badge-sold';
                    const imageCount = Array.isArray(car.images) ? car.images.length : 0;
                    const price = car.specifications?.monthlyLeasing ? 
                                 `${car.specifications.monthlyLeasing.toLocaleString('da-DK')} kr./md.` :
                                 `${car.price.toLocaleString('da-DK')} kr.`;
                    
                    tableHTML += `
                        <tr>
                            <td><strong>${car.id}</strong></td>
                            <td>${car.brand}</td>
                            <td>${car.model}</td>
                            <td>${car.year}</td>
                            <td>${price}</td>
                            <td><span class="badge ${statusClass}">${status}</span></td>
                            <td>${imageCount} billeder</td>
                        </tr>
                    `;
                });
                
                tableHTML += `
                        </tbody>
                    </table>
                `;
                
                carsTable.innerHTML = tableHTML;
                loading.style.display = 'none';
                
                message.innerHTML = `<div class="success">✅ Hentet ${cars.length} biler fra databasen</div>`;
                
            } catch (error) {
                console.error('❌ Error:', error);
                loading.style.display = 'none';
                message.innerHTML = `<div class="error">❌ Fejl: ${error.message}</div>`;
            }
        }
        
        // Load on page load
        document.addEventListener('DOMContentLoaded', loadCars);
    </script>
</body>
</html>
