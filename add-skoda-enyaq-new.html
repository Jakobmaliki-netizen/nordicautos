<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilføj Skoda Enyaq - Nordic Autos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; }
        h1 { color: #2d3748; margin-bottom: 10px; font-size: 32px; }
        .subtitle { color: #718096; margin-bottom: 30px; font-size: 18px; }
        .car-info { background: #f7fafc; padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 12px; color: #718096; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 18px; color: #2d3748; font-weight: 600; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 18px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); display: block; width: 100%; margin-top: 30px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; }
        .result.success { background: #c6f6d5; color: #22543d; }
        .result.error { background: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Tilføj Skoda Enyaq 80 iV Sportline</h1>
        <p class="subtitle">Klik på knappen for at tilføje bilen til databasen</p>
        
        <div class="car-info">
            <h2 style="color: #2d3748; margin-bottom: 20px;">Bil Information</h2>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">Mærke</span><span class="info-value">Skoda</span></div>
                <div class="info-item"><span class="info-label">Model</span><span class="info-value">Enyaq 80 iV Sportline</span></div>
                <div class="info-item"><span class="info-label">Årgang</span><span class="info-value">2022</span></div>
                <div class="info-item"><span class="info-label">Kilometerstand</span><span class="info-value">70.500 km</span></div>
                <div class="info-item"><span class="info-label">Brændstof</span><span class="info-value">El</span></div>
                <div class="info-item"><span class="info-label">Hestekræfter</span><span class="info-value">204 HK</span></div>
                <div class="info-item"><span class="info-label">Pris</span><span class="info-value" style="color: #667eea; font-size: 24px;">268.000 kr.</span></div>
            </div>
        </div>
        
        <button class="btn" onclick="addCar()">➕ Tilføj Skoda Enyaq til Database</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gfbsuydsquixhrrarjab.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmYnN1eWRzcXVpeGhycmFyamFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMjE5NDcsImV4cCI6MjA4NTU5Nzk0N30.M4nA8itsVSpcZb4l1w3cHtl_86KV89BHyt7xNE0hdSY';
        const { createClient } = supabase;
        window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const carData = {
            brand: 'Skoda',
            model: 'Enyaq 80 iV Sportline',
            variant: '80 iV Sportline',
            year: 2022,
            mileage: 70500,
            price: 268000,
            fuelType: 'El',
            bodyType: 'SUV',
            horsepower: 204,
            description: `Skoda Enyaq 80 iV Sportline

🚘 Køretøjsinformation
• Skoda Enyaq 80 iV Sportline
• Årgang: 2022
• Kilometerstand: 70.500 km
• Motor / Effekt: El / 204 HK
• Brændstof: El
• Gearkasse: Automatisk
• Træk: Baghjulstræk

✨ Udstyr
• Sportline pakke
• Infotainment system
• LED forlygter
• Klimaanlæg
• Parkeringssensorer
• Adaptiv fartpilot

📘 Stand & historik
• Importeret og udvalgt af Nordic Autos
• Bilen fremstår i flot og velholdt stand

🏢 Om Nordic Autos
Nordic Autos er specialiseret i leasing og salg af eksklusive kvalitetsbiler.

📞 Kontakt os for mere information eller fremvisning`,
            features: ['Sportline pakke','LED forlygter','Klimaanlæg','Parkeringssensorer','Adaptiv fartpilot','Infotainment system','El-ruder','Centrallås','ABS-bremser','Airbags','Multifunktionsrat','Bluetooth','USB tilslutning','Automatisk klima','Regnsensor','Fartpilot'],
            images: [
                'https://example.com/skoda-enyaq-1.jpg',
                'https://example.com/skoda-enyaq-2.jpg',
                'https://example.com/skoda-enyaq-3.jpg',
                'https://example.com/skoda-enyaq-4.jpg',
                'https://example.com/skoda-enyaq-5.jpg',
                'https://example.com/skoda-enyaq-6.jpg',
                'https://example.com/skoda-enyaq-7.jpg',
                'https://example.com/skoda-enyaq-8.jpg',
                'https://example.com/skoda-enyaq-9.jpg',
                'https://example.com/skoda-enyaq-10.jpg',
                'https://example.com/skoda-enyaq-11.jpg',
                'https://example.com/skoda-enyaq-12.jpg',
                'https://example.com/skoda-enyaq-13.jpg',
                'https://example.com/skoda-enyaq-14.jpg',
                'https://example.com/skoda-enyaq-15.jpg',
                'https://example.com/skoda-enyaq-16.jpg'
            ],
            status: 'available',
            specifications: {
                color: 'Blå',
                interior: 'Stof',
                transmission: 'Automatisk',
                drive: 'Baghjulstræk'
            }
        };
        
        async function addCar() {
            const btn = document.querySelector('.btn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = '⏳ Tilføjer bil...';
            result.style.display = 'none';
            
            try {
                const { data, error } = await window.supabaseClient.from('cars').insert([carData]).select();
                if (error) throw error;
                
                result.className = 'result success';
                result.innerHTML = `<h3>✅ Skoda Enyaq tilføjet!</h3><p>Bil ID: ${data[0].id}</p>`;
                result.style.display = 'block';
                btn.textContent = '✅ Bil tilføjet!';
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `<h3>❌ Fejl</h3><p>${error.message}</p>`;
                result.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '➕ Tilføj Skoda Enyaq til Database';
            }
        }
    </script>
</body>
</html>
