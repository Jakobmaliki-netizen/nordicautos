        .price-highlight { color: #667eea; font-size: 18px; font-weight: bold; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 18px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); display: block; width: 100%; margin-top: 30px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .progress-container { margin-top: 30px; display: none; }
        .progress-bar { width: 100%; height: 30px; background: #e2e8f0; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; }
        .progress-log { background: #f7fafc; border-radius: 12px; padding: 20px; max-height: 400px; overflow-y: auto; }
        .log-entry { padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 14px; }

        .log-success { color: #48bb78; }
        .log-error { color: #f56565; }

        .result { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; }

        function addLogEntry(message, type = 'info') {
            const log = document.getElementById('progressLog');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString('da-DK');
            entry.textContent = `[${timestamp}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        async function addAllCars() {
            const btn = document.querySelector('.btn');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const result = document.getElementById('result');
            const addedCountEl = document.getElementById('addedCount');
            const errorCountEl = document.getElementById('errorCount');
            
            btn.disabled = true;
            btn.textContent = '⏳ Tilføjer biler...';
            progressContainer.style.display = 'block';
            result.style.display = 'none';
            
            let addedCount = 0;
            let errorCount = 0;
            
            addLogEntry('🚀 Starter tilføjelse af 13 biler...', 'info');
            
            for (let i = 0; i < carsData.length; i++) {
                const car = carsData[i];
                const progress = Math.round(((i + 1) / carsData.length) * 100);
                
                try {
                    addLogEntry(`Tilføjer bil ${i + 1}/${carsData.length}: ${car.brand} ${car.model}`, 'info');
                    
                    const { data, error } = await window.supabaseClient
                        .from('cars')
                        .insert([car])
                        .select();
                    
                    if (error) throw error;
                    
                    addedCount++;
                    addedCountEl.textContent = addedCount;
                    addLogEntry(`✅ ${car.brand} ${car.model} tilføjet (ID: ${data[0].id})`, 'success');
                    
                } catch (error) {
                    errorCount++;
                    errorCountEl.textContent = errorCount;
                    addLogEntry(`❌ Fejl ved ${car.brand} ${car.model}: ${error.message}`, 'error');
                    console.error('Error adding car:', car, error);
                }
                
                progressFill.style.width = `${progress}%`;
                progressFill.textContent = `${progress}%`;
                
                // Small delay to avoid rate limiting
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            // Final result
            if (errorCount === 0) {
                result.className = 'result success';
                result.innerHTML = `<h3 style="margin-bottom: 10px;">✅ Alle ${addedCount} biler tilføjet!</h3><p>Bilerne er nu tilgængelige på lagerbiler-siden.</p>`;
                btn.textContent = '✅ Alle biler tilføjet!';
                addLogEntry(`🎉 Færdig! ${addedCount} biler tilføjet uden fejl`, 'success');
            } else {
                result.className = 'result error';
                result.innerHTML = `<h3 style="margin-bottom: 10px;">⚠️ Tilføjelse færdig med fejl</h3><p>${addedCount} biler tilføjet, ${errorCount} fejl.</p>`;
                btn.textContent = '⚠️ Færdig med fejl';
                btn.disabled = false;
                addLogEntry(`⚠️ Færdig med ${errorCount} fejl`, 'error');
            }
            
            result.style.display = 'block';
        }
